<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Hub</title>
    <meta name="description" content="A premium real-time dashboard for browsing, searching, and sharing Google Cloud BigQuery release notes.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Favicon (Fallback to SVG emoji) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar or Header section -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>BigQuery Release Hub</h1>
                    <p class="tagline">Explore, search, and share official BigQuery updates</p>
                </div>
            </div>
            
            <div class="app-stats">
                <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Theme">
                    <svg class="theme-icon-dark" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
                    </svg>
                    <svg class="theme-icon-light" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" style="display: none;">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                    </svg>
                </button>
                <div class="stat-item">
                    <span class="stat-label">Total Notes</span>
                    <span id="stat-count" class="stat-value">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Last Checked</span>
                    <span id="stat-time" class="stat-value">--</span>
                </div>
                <div class="stat-item source-indicator">
                    <span class="indicator-dot" id="indicator-dot"></span>
                    <span id="stat-source" class="stat-value">Syncing</span>
                </div>
            </div>
        </header>

        <!-- Main Dashboard Controls -->
        <main class="dashboard-main">
            <div class="controls-panel">
                <div class="search-bar-container">
                    <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input" placeholder="Search release notes by keyword..." autocomplete="off">
                    <button id="clear-search" class="clear-search-btn" style="display: none;">&times;</button>
                </div>
                
                <div class="action-buttons">
                    <div class="custom-select-wrapper">
                        <select id="type-filter">
                            <option value="all">All Types</option>
                            <!-- Dynamically populated options -->
                        </select>
                    </div>
                    
                    <button id="refresh-btn" class="btn btn-primary" title="Refresh Release Notes">
                        <svg class="refresh-spinner" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
                        </svg>
                        <span>Refresh Feed</span>
                    </button>
                </div>
            </div>

            <!-- Filters Pills container (Dynamically Rendered) -->
            <div class="pills-container" id="type-pills">
                <!-- Javascript will render filter pills here -->
            </div>

            <!-- Release Notes List -->
            <div class="releases-feed" id="releases-feed">
                <!-- Skeleton Loader initially, then populated by JS -->
            </div>
        </main>
    </div>

    <!-- Twitter Mock Share Modal -->
    <div id="tweet-modal" class="modal-overlay" style="display: none;">
        <div class="modal-container">
            <div class="modal-header">
                <h3>Share on X / Twitter</h3>
                <button class="close-modal-btn" id="close-modal">&times;</button>
            </div>
            
            <div class="modal-body">
                <!-- Mock Tweet Card -->
                <div class="mock-tweet-card">
                    <div class="tweet-user-info">
                        <div class="tweet-avatar">
                            <!-- SVG Google Cloud Logo representation -->
                            <svg viewBox="0 0 24 24" width="24" height="24">
                                <path fill="#ea4335" d="M12 2L2 7l10 5 10-5-10-5z"/>
                                <path fill="#4285f4" d="M2 7v10l10 5V12L2 7z"/>
                                <path fill="#fbbc05" d="M22 7v10l-10 5V12l10-5z"/>
                            </svg>
                        </div>
                        <div class="tweet-user-meta">
                            <div class="tweet-display-name">
                                <span>BigQuery Release Hub</span>
                                <svg class="verified-badge" viewBox="0 0 24 24" width="16" height="16" fill="#1d9bf0">
                                    <path d="M22.5 12.5c0-1.58-.875-2.95-2.148-3.6.154-.435.238-.905.238-1.4 0-2.21-1.71-3.99-3.818-3.99-.48 0-.94.1-1.348.27C14.825 2.515 13.512 1.5 12 1.5s-2.825 1.015-3.422 2.28c-.407-.17-.867-.27-1.348-.27-2.108 0-3.818 1.78-3.818 3.99 0 .495.084.965.238 1.4-1.273.65-2.148 2.02-2.148 3.6 0 1.58.875 2.95 2.148 3.6-.154.435-.238.905-.238 1.4 0 2.21 1.71 3.99 3.818 3.99.48 0 .94-.1 1.348-.27.597 1.265 1.91 2.28 3.422 2.28s2.825-1.015 3.422-2.28c.407.17.867.27 1.348.27 2.108 0 3.818-1.78 3.818-3.99 0-.495-.084-.965-.238-1.4 1.273-.65 2.148-2.02 2.148-3.6zm-12.72 3.25l-2.91-2.92 1.34-1.35 1.57 1.57 3.5-3.56 1.35 1.34-4.85 4.92z"/>
                                </svg>
                            </div>
                            <span class="tweet-handle">@BigQueryUpdates</span>
                        </div>
                    </div>
                    
                    <div class="tweet-composer-area">
                        <textarea id="tweet-textarea" rows="5" placeholder="What's happening?"></textarea>
                    </div>
                    
                    <!-- Character count indicator inside the mock tweet -->
                    <div class="tweet-footer">
                        <div class="tweet-limit-container">
                            <svg class="progress-ring" width="30" height="30">
                                <circle class="progress-ring-bg" stroke="#2f3336" stroke-width="2" fill="transparent" r="10" cx="15" cy="15"/>
                                <circle class="progress-ring-circle" id="char-progress" stroke="#1d9bf0" stroke-width="2" fill="transparent" r="10" cx="15" cy="15"/>
                            </svg>
                            <span id="char-count" class="char-count-text">280</span>
                        </div>
                        
                        <button id="submit-tweet-btn" class="btn btn-x-post">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                            </svg>
                            Post to X
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script imports -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
